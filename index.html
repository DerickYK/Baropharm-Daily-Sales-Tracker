<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMS Daily Sales Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:13px;background:#F4F6F9;color:#222}
.wrap{max-width:1440px;margin:0 auto;padding:12px}
.hdr{background:#1F3864;color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:15px;font-weight:500}.hdr p{font-size:10px;opacity:.75;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.update-info{font-size:10px;color:#fff;opacity:.85}
.btn-file{background:#2E75B6;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-file:hover{background:#1a5fa0}
.drop-area{border:1.5px dashed #B0C4DE;border-radius:8px;margin:10px 0;padding:10px 16px;background:#F8FBFF;cursor:pointer;text-align:center;transition:all .2s;font-size:12px;color:#666}
.drop-area.over{border-color:#2E75B6;background:#EBF5FB}
.drop-area strong{color:#1F3864}
.wd-bar{background:#EBF4FF;border:0.5px solid #BDD7EE;border-radius:6px;padding:7px 14px;margin-bottom:10px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:12px}
.wd-bar .badge{background:#1F3864;color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:500}
.wd-item{display:flex;flex-direction:column;gap:1px}
.wd-item .wlbl{font-size:10px;color:#666}
.wd-item .wval{font-size:13px;font-weight:500;color:#1F3864}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.scard{background:#fff;border-radius:8px;padding:10px 12px;border:0.5px solid #DDE3EB}
.scard .lbl{font-size:11px;color:#666;margin-bottom:3px}
.scard .val{font-size:17px;font-weight:500;color:#1F3864}
.scard .sub{font-size:10px;color:#999;margin-top:2px}
.tabs{display:flex;background:#F5F7FA;border-bottom:0.5px solid #DDD;overflow-x:auto}
.tab{padding:7px 13px;font-size:12px;cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;color:#777;font-family:inherit;white-space:nowrap}
.tab:hover{color:#333}
.tab.on{font-weight:500;color:#111}
.tab.on.t0{border-bottom-color:#E67E22}
.tab.on.t1{border-bottom-color:#1F3864}.tab.on.t2{border-bottom-color:#1F6B3E}
.tab.on.t3{border-bottom-color:#7B2D8B}.tab.on.t4{border-bottom-color:#4472C4}.tab.on.t5{border-bottom-color:#4A7C59}
.panel{display:none}.panel.on{display:block}
.sec-head{padding:8px 14px;font-size:13px;font-weight:500;color:#fff;display:flex;align-items:center;gap:6px}
.sec-head span{font-weight:400;font-size:11px;opacity:.8}
.c0{background:#D35400}.c1{background:#1F3864}.c2{background:#1F6B3E}
.c3{background:#7B2D8B}.c4{background:#4472C4}.c5{background:#4A7C59}
/* 그래프 영역 */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
.chart-box{background:#fff;border-radius:8px;border:0.5px solid #DDE3EB;padding:14px}
.chart-box.wide{grid-column:1/-1}
.chart-title{font-size:12px;font-weight:500;color:#1F3864;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.chart-title .ct-badge{font-size:10px;background:#EBF4FF;color:#2E75B6;border-radius:3px;padding:1px 6px}
.chart-wrap{position:relative;height:220px}
.chart-wrap.tall{height:260px}
/* 테이블 */
table{width:100%;border-collapse:collapse;table-layout:fixed}thead tr:first-child th{height:26px;line-height:26px}thead tr:last-child th{height:22px;line-height:22px}thead tr{border-bottom:0.5px solid rgba(255,255,255,0.2)}
th{font-size:10px;font-weight:500;padding:4px 6px;border-bottom:0.5px solid #ddd;white-space:nowrap;overflow:hidden;height:22px}
th.L{text-align:left}th.R{text-align:right}th.C{text-align:center}
th.h1{background:#1F3864;color:#BDD7EE;height:24px}th.h2{background:#2E75B6;color:#fff}
th.h3{background:#7B3F00;color:#FFE0B2}th.hg{background:#E8EEF5;color:#555;height:20px;min-height:20px;line-height:20px;font-size:10px}
td{padding:4px 6px;border-bottom:0.5px solid #eee;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td.L{text-align:left}td.R{text-align:right}td.C{text-align:center}
td.nm{text-align:left;font-size:12px}td.sub{text-align:left;font-size:10px;color:#888}
tr.ev td{background:#F0F6FC}tr.od td{background:#fff}
tr.baro td{background:#E8F5E9!important}tr.total-row td{background:#FEF9EC!important;font-weight:500;color:#7B3F00}
tr.tot td{background:#FFF9C4!important;color:#7F6000;font-weight:500;border-top:1px solid #E6D87A}
tr.grand td{background:#1F3864!important;color:#fff;font-weight:500}
td.ki{background:#FFF3E0!important}td.inp{background:#FFFDE7!important}
.ki-input{width:100%;background:transparent;border:none;outline:none;text-align:right;font-size:11px;color:#7F4000;font-weight:500;font-family:inherit;padding:0}
.ki-input::placeholder{color:#D9A06A;font-size:10px}
.ki-pct{font-size:10px;text-align:right;margin-top:1px}
.man-input{width:100%;background:transparent;border:none;outline:none;text-align:right;font-size:11px;font-family:inherit;padding:0}
.man-input::placeholder{color:#bbb;font-size:10px}
/* 이미지 업로드 */
.img-drop{border:1.5px dashed #F0A06A;border-radius:6px;padding:8px 12px;background:#FFF8F3;cursor:pointer;text-align:center;font-size:11px;color:#7B3F00;transition:all .2s;margin-top:6px}
.img-drop:hover{background:#FEEEDD}
.img-preview{max-width:100%;border-radius:6px;margin-top:6px;border:0.5px solid #ddd}
.ocr-result{font-size:11px;color:#333;background:#FFF8F3;border:0.5px solid #F0A06A;border-radius:4px;padding:6px;margin-top:4px}
.g{color:#1F6B3E}.w{color:#C0392B}.na{color:#aaa}
.note{font-size:10px;color:#aaa;padding:5px 12px;border-top:0.5px solid #eee}
@media(max-width:768px){.summary{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}.chart-box.wide{grid-column:auto}}

/* 공유용 추가 스타일 */
.share-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#E8F5E9;color:#1F6B3E;
  border:0.5px solid #A5D6A7;border-radius:12px;
  padding:3px 10px;font-size:11px;font-weight:500;
  margin-left:8px;
}
@media print{
  .btn-file,.drop-area,.img-drop,.paste-zone input[type=file]{display:none!important}
  .hdr{border-radius:0}
  .wrap{padding:0}
}
</style>
</head>
<body>
<div class="wrap">
<div style="background:#fff;border-radius:8px;border:0.5px solid #DDE3EB;overflow:hidden">

<!-- 헤더 -->
<div class="hdr">
  <div>
    <h1>📊 BMS Daily Sales Tracker &nbsp;<span class="share-badge" id="hdr-badge">📅 📅 2026-07-01 기준 &nbsp;|&nbsp; Jul W.D 0/22일 (0.00%)</span></h1>
    <p id="hdr-sub">단위: 백만원(M) · 소수점 2자리 | KPI 수기 입력 가능 | 기준일: 2026-07-01 (W.D 3/22일 · 13.64%)</p>
  </div>
  <div class="hdr-right">

    <button class="btn-file" onclick="document.getElementById('file-inp').click()">📂 Jul MTD 업데이트</button>
    <input id="file-inp" type="file" accept=".xlsx,.xls,.csv" style="display:none">
  </div>
</div>

<!-- 드롭 영역 -->
<div class="drop-area" id="drop-area">
  엑셀 파일을 <strong>끌어다 놓거나 클릭</strong>해서 당월 MTD 데이터 업로드
</div>

<!-- 워킹데이 현황바 -->
<div class="wd-bar">
  <span class="badge">워킹데이</span>
  <div class="wd-item"><div class="wlbl">Apr.</div><div class="wval">22일</div></div>
  <div class="wd-item"><div class="wlbl">May</div><div class="wval">3일</div></div>

  <div class="wd-item"><div class="wlbl">월 진행율</div><div class="wval" id="wd-prog" style="color:#2E75B6">4.55%</div></div>
  <div class="wd-item"><div class="wlbl">Jun. 총 워킹데이</div><div class="wval" id="wd-tot">22일</div></div>
  <div class="wd-item"><div class="wlbl">공휴일 제외</div><div class="wval" style="font-size:11px;color:#666">7/17 제헌절</div></div>
</div>

<!-- 요약 카드 -->
<div class="summary" id="summary"></div>

<!-- 탭 -->
<div class="tabs">
  <button class="tab t0 on" onclick="showTab('dash',this)">📈 Dashboard</button>
  <button class="tab t1" onclick="showTab('bms',this)">▶ 바로팜 매출 Summary</button>
  <button class="tab t2" onclick="showTab('brand',this)">🏪 브랜드관</button>
  <button class="tab t3" onclick="showTab('direct',this)">🤝 직거래</button>
  <button class="tab t4" onclick="showTab('prod',this)">주요 품목</button>
  <button class="tab t5" onclick="showTab('ow',this)">아워팜 품목</button>
</div>

<div id="p-dash" class="panel on"></div>
<div id="p-bms"  class="panel"></div>
<div id="p-brand" class="panel"></div>
<div id="p-direct" class="panel"></div>
<div id="p-prod" class="panel"></div>
<div id="p-ow"  class="panel"></div>


</div>
</div>

function calcWD(year,month,lastDay){
  const hl=month===7?HOLIDAYS_JUL:[];
  let tot=0,el=0;
  for(let d=1;d<=31;d++){
    try{
      const dt=new Date(year,month-1,d);
      if(dt.getMonth()!==month-1)break;
      const key=year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      if(dt.getDay()!==0&&dt.getDay()!==6&&!hl.includes(key)){
        tot++;if(d<=lastDay)el++;
      }
    }catch(e){break;}
  }
  return{tot,elapsed:el};
}
function fm(n){
  if(n==null||isNaN(n))return '-';
  return (Math.round(n*100)/100).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function ph(a,b){
  if(!b)return '<span class="na">-</span>';
  const v=a/b*100,cls=v>=100?'g':v>=80?'':'w';
  return `<span class="${cls}">${v.toFixed(1)}%</span>`;
}
function fcst(j){return WD_E>0?j/WD_E*WD_T:0;}
function svM(bv,ns){return ns.reduce((s,n)=>s+(bv[n]||0),0);}
function gskw(rows,kw,vendors){
  return rows.filter(r=>(kw?((r['상품명']||'').includes(kw)):true)&&(vendors?vendors.includes(r['도매상']):true))
    .reduce((s,r)=>s+(Number(r['실주문금액'])||0),0)/1e6;
}
function sumKws(rows,kws,vendors){return kws.reduce((s,k)=>s+gskw(rows,k,vendors),0);}
function pc(v){return v>=100?'#1F6B3E':v>=80?'#555':'#C0392B';}

function kpiCell(id,j){
  const k=KPI[id]||'',kn=parseFloat(k.replace(/,/g,''));
  let p2='';
  if(kn>0&&!isNaN(kn)){
    const f=fcst(j),a=f/kn*100,pg=j/kn*100;
    p2=`<div class="ki-pct"><span style="color:${pc(a)}">마감${a.toFixed(1)}%</span><span class="na"> / MTD ${pg.toFixed(1)}%</span></div>`;
  }
  return `<td class="ki"><input class="ki-input" id="${id}" placeholder="KPI(M)" value="${k}" oninput="setKpi('${id}',${j})">${p2}</td>`;
}

function handleImg(e,type){ if(e.target.files[0]) processImg(e.target.files[0],type); }

// ── Ctrl+V paste 처리 ─────────────────────────────────────────────
// 각 paste-zone은 tabindex=0으로 포커스 가능하게 만들고
// 포커스된 zone에 paste 이벤트가 직접 전달되도록 함
// + document 레벨에서도 백업으로 캐치

let _activeZone = 'total'; // 현재 활성 zone

// zone 활성화 함수 (클릭 또는 포커스 시 호출)
function activateZone(type){
  _activeZone = type;
  ['total','baro','deposit'].forEach(t=>{
    const el = document.getElementById('paste-zone-'+t);
    if(!el) return;
    if(t === type){
      el.style.borderColor = t==='total'?'#E67E22':t==='baro'?'#2980B9':'#8E44AD';
      el.style.background = t==='total'?'#FFF0E0':t==='baro'?'#EBF5FB':'#F5EEF8';
      el.style.boxShadow = '0 0 0 2px '+(t==='total'?'rgba(230,126,34,0.3)':t==='baro'?'rgba(41,128,185,0.3)':'rgba(142,68,173,0.3)');
    } else {
      el.style.borderColor = t==='total'?'#F0A06A':t==='baro'?'#7BAFD0':'#9B8ED0';
      el.style.background = '#fff';
      el.style.boxShadow = 'none';
    }
  });
}

// document 레벨 paste (Ctrl+V 어디서든 캐치)
document.addEventListener('paste', function(e){
  const items = e.clipboardData?.items || [];
  for(let i=0; i<items.length; i++){
    if(items[i].type.startsWith('image/')){
      const file = items[i].getAsFile();
      if(!file) continue;
      processImg(file, _activeZone);
      e.preventDefault();
      e.stopPropagation();
      return;
    }
  }
}, true); // capture phase에서 처리 (버블링 이전)

{"금액":숫자,"단위":"B또는M또는원","환산_백만원":숫자,"월":"YYYY-MM","메모":"","x축_마지막":"x축에 표시된 마지막 연월"}
단위: B(billion,십억)이면 ×1000해서 백만원으로, M이면 그대로, 원이면 ÷1000000. 소수점 없이 정수로.`,

  baro:`이 이미지는 바로팜 "바로몰 주문금액" 통계 차트 캡쳐입니다.
가장 최근(오른쪽 끝) 막대의 바로몰 주문금액을 읽어서 JSON으로만 응답하세요:
{"금액":숫자,"단위":"B또는M또는원","환산_백만원":숫자,"월":"YYYY-MM","메모":""}
단위: B이면 ×1000, M이면 그대로, 원이면 ÷1000000.`,

  deposit:`이 이미지는 바로팜 "예치금 금액" 통계 차트 캡쳐입니다. 파란색=충전, 빨간색=사용.
가장 최근(오른쪽 끝) 데이터의 충전/사용 금액을 읽어서 JSON으로만 응답하세요:
{"충전":숫자,"사용":숫자,"단위":"B또는M또는원","충전_백만원":숫자,"사용_백만원":숫자,"월":"YYYY-MM","메모":""}`
};

async function processImg(file,type){
  const zoneEl=document.getElementById(`paste-zone-${type}`);
  const prevEl=document.getElementById(`prev-${type}`);
  const statusEl=document.getElementById('ocr-status');

  // 미리보기
  const url=URL.createObjectURL(file);
  if(prevEl) prevEl.innerHTML=`<img src="${url}" style="max-width:100%;max-height:80px;border-radius:4px;border:0.5px solid #ddd">`;
  if(zoneEl){
    zoneEl.innerHTML='<span style="font-size:16px">🔍</span><span>분석 중...</span>';
    zoneEl.style.color='#999';
  }
  if(statusEl) statusEl.textContent=`⏳ ${type==='total'?'바로팜Total':type==='baro'?'바로팜몰':'예치금'} 이미지 분석 중...`;

  const b64=await new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=ev=>res(ev.target.result.split(',')[1]);
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:500,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:file.type||'image/png',data:b64}},
          {type:'text',text:OCR_PROMPTS[type]}
        ]}]
      })
    });
    const data=await resp.json();
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=raw.replace(/```json|```/g,'').trim();
    const p=JSON.parse(clean);

    let msg='';
    if(type==='total'&&p.환산_백만원!=null){
      // 월 정보로 Apr/May/Jun 구분 저장
      const mon=p.월||'';
      if(mon.includes('-04')||mon.includes('04월')){BAROFARM_TOTAL_APR=p.환산_백만원;const el=document.getElementById('bf-total-apr');if(el)el.value=p.환산_백만원;}
      else if(mon.includes('-05')||mon.includes('05월')){BAROFARM_TOTAL_MAY=p.환산_백만원;const el=document.getElementById('bf-total-may');if(el)el.value=p.환산_백만원;}
      else {BAROFARM_TOTAL_JUL=p.환산_백만원;const el=document.getElementById('bf-total-jun');if(el)el.value=p.환산_백만원;}
      msg=`✅ 바로팜Total: ${(p.환산_백만원/100).toFixed(2)}억 (${p.월||'최근월'})`;
    } else if(type==='baro'&&p.환산_백만원!=null){
      const mon=p.월||'';
      if(mon.includes('-04')||mon.includes('04월')){BAROFARM_BARO_APR=p.환산_백만원;const el=document.getElementById('bf-baro-apr');if(el)el.value=p.환산_백만원;}
      else if(mon.includes('-05')||mon.includes('05월')){BAROFARM_BARO_MAY=p.환산_백만원;const el=document.getElementById('bf-baro-may');if(el)el.value=p.환산_백만원;}
      else {BAROFARM_BARO_JUL=p.환산_백만원;const el=document.getElementById('bf-baro-jun');if(el)el.value=p.환산_백만원;}
      msg=`✅ 바로팜몰: ${(p.환산_백만원/100).toFixed(2)}억 (${p.월||'최근월'})`;
    } else if(type==='deposit'){
      if(p.충전_백만원!=null){
        DEPOSIT_CHARGE_JUN=p.충전_백만원;
        const el=document.getElementById('bf-dep-charge');
        if(el)el.value=p.충전_백만원;
      }
      if(p.사용_백만원!=null){
        DEPOSIT_USE_JUN=p.사용_백만원;
        const el=document.getElementById('bf-dep-use');
        if(el)el.value=p.사용_백만원;
      }
      msg=`✅ 예치금 충전: ${(p.충전_백만원/100||0).toFixed(2)}억 / 사용: ${(p.사용_백만원/100||0).toFixed(2)}억`;
    }
    if(statusEl) statusEl.innerHTML=`<span style="color:#1F6B3E">${msg}</span> ${p.메모?'— '+p.메모:''}`;
    if(zoneEl){
      zoneEl.innerHTML='<span style="font-size:16px">✅</span><span>인식 완료</span><span style="font-size:10px;color:#aaa">다시 Ctrl+V 가능</span>';
      zoneEl.style.color='#1F6B3E';
    }
    render();
  } catch(err){
    if(statusEl) statusEl.innerHTML='<span style="color:#C0392B">❌ 인식 실패 — 수기 입력으로 직접 입력해 주세요</span>';
    if(zoneEl){
      zoneEl.innerHTML='<span style="font-size:16px">❌</span><span>실패 — 다시 시도</span>';
      zoneEl.style.color='#C0392B';
      setTimeout(()=>{
        if(zoneEl){
          zoneEl.innerHTML='<span style="font-size:16px">📋</span><span>Ctrl+V 붙여넣기</span><span style="font-size:10px;color:#bbb">또는 클릭하여 파일 선택</span>';
          zoneEl.style.color='#888';
        }
      },3000);
    }
    console.error(err);
  }
}

// ── MTD 파일 처리 ─────────────────────────────────────────────
function processFile(file){
  const da=document.getElementById('drop-area');
  da.textContent='파일 처리 중...';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const sn=wb.SheetNames.find(n=>n.includes('MTD')||n.includes('상품별'))||wb.SheetNames[0];
      const ws=wb.Sheets[sn];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      JUL_ROWS=rows;JUL_V={};JUL_TOT=0;DAILY_JUL={};
      let maxDate=null;
      rows.forEach(r=>{
        const v=r['도매상']||'';
        const amt=Number((r['실주문금액']||'').toString().replace(/,/g,''))||0;
        JUL_V[v]=(JUL_V[v]||0)+amt/1e6;JUL_TOT+=amt/1e6;
        const dStr=r['주문일시']||r['날짜']||'';
        if(dStr){
          const dt=new Date(dStr);
          if(!isNaN(dt)){
            if(!maxDate||dt>maxDate)maxDate=dt;
            const day=dt.getDate();
            DAILY_JUL[day]=(DAILY_JUL[day]||0)+amt/1e6;
          }
        }
      });
      let year=2026,month=7,lastDay=1;
      if(maxDate){year=maxDate.getFullYear();month=maxDate.getMonth()+1;lastDay=maxDate.getDate();}
      const wd=calcWD(year,month,lastDay);
      WD_E=wd.elapsed;WD_T=wd.tot;
      CAL_E=lastDay;
      WD_REF=`${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
      const now=new Date();
      document.getElementById('update-info').textContent=`✓ 갱신완료 · ${rows.length.toLocaleString()}행 · ${now.toLocaleTimeString()}`;
      da.innerHTML=`✅ <strong>${file.name}</strong> (${rows.length.toLocaleString()}행) | 최종주문일: <strong>${WD_REF}</strong> | 경과WD: <strong>${WD_E}일</strong>/${WD_T}일 — 새 파일 드래그 또는 클릭`;
    }catch(err){
      alert('파일 읽기 실패: '+err.message);
      da.innerHTML='엑셀 파일을 <strong>끌어다 놓거나 클릭</strong>해서 당월 MTD 데이터 업로드';
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

// ── 탭·이벤트 ────────────────────────────────────────────────
function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  btn.classList.add('on');
}
document.getElementById('file-inp').addEventListener('change',e=>{if(e.target.files[0])processFile(e.target.files[0]);});
const da=document.getElementById('drop-area');
da.addEventListener('click',()=>document.getElementById('file-inp').click());
da.addEventListener('dragover',e=>{e.preventDefault();da.classList.add('over');});
da.addEventListener('dragleave',()=>da.classList.remove('over'));
da.addEventListener('drop',e=>{e.preventDefault();da.classList.remove('over');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});

render();
</script>
